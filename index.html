<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⚽ League Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0d0d1a;font-family:'Trebuchet MS',sans-serif;color:#fff;min-height:100vh;}
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
  input[type=number]{-moz-appearance:textfield;}
  .header{background:linear-gradient(135deg,#1a1a3e,#0d0d1a);border-bottom:2px solid #e2b96b22;padding:20px 20px 0;}
  .header-inner{max-width:820px;margin:0 auto;}
  .title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .logo{display:flex;align-items:center;gap:12px;}
  .logo-text{font-size:20px;font-weight:900;letter-spacing:2px;color:#e2b96b;text-transform:uppercase;}
  .logo-sub{font-size:10px;color:#444;letter-spacing:1px;}
  .btn-row{display:flex;align-items:center;gap:8px;position:relative;}
  .saved-msg{font-size:11px;color:#69f0ae;letter-spacing:1px;}
  .btn{padding:8px 16px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;letter-spacing:1px;border:none;}
  .btn-export{border:1px solid #7ec8e355;background:linear-gradient(135deg,#0d2137,#1a1a3e);color:#7ec8e3;}
  .btn-reset{border:1px solid #ff6b6b33;background:#ff6b6b0d;color:#ff6b6b77;font-size:11px;}
  .export-menu{display:none;position:absolute;right:0;top:calc(100% + 6px);background:#12122a;border:1px solid #7ec8e322;border-radius:12px;overflow:hidden;z-index:100;box-shadow:0 12px 32px #000c;min-width:200px;}
  .export-menu.open{display:block;}
  .export-menu-title{padding:8px 16px 6px;font-size:10px;color:#555;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid #ffffff08;}
  .export-item{display:block;width:100%;padding:12px 18px;background:transparent;border:none;border-bottom:1px solid #ffffff07;color:#ccc;font-size:13px;text-align:left;cursor:pointer;letter-spacing:.5px;font-family:'Trebuchet MS',sans-serif;}
  .export-item:hover{background:rgba(126,200,227,.07);}
  .export-item.all{color:#e2b96b;font-weight:700;}
  .tabs{display:flex;margin-top:16px;}
  .tab{padding:10px 20px;background:transparent;border:none;border-radius:8px 8px 0 0;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:#555;font-family:'Trebuchet MS',sans-serif;}
  .tab.active{background:#e2b96b;color:#000;}
  .content{max-width:820px;margin:0 auto;padding:20px 16px;}
  .panel{display:none;}.panel.active{display:block;}
  /* standings */
  .standings-table{background:#12122a;border-radius:16px;overflow:hidden;border:1px solid #ffffff08;box-shadow:0 8px 32px #00000060;}
  .st-header{display:grid;grid-template-columns:42px 1fr 38px 38px 38px 38px 44px 44px 48px 54px;padding:10px 16px;background:#1a1a3e;font-size:10px;font-weight:700;letter-spacing:1.5px;color:#e2b96b;text-transform:uppercase;gap:2px;}
  .st-row{display:grid;grid-template-columns:42px 1fr 38px 38px 38px 38px 44px 44px 48px 54px;padding:12px 16px;border-top:1px solid #ffffff06;align-items:center;gap:2px;}
  .st-row:nth-child(odd){background:#12122a;}.st-row:nth-child(even){background:#0f0f22;}
  .pos-badge{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;}
  .team-cell{display:flex;align-items:center;gap:8px;}
  .team-strip{width:4px;height:28px;border-radius:2px;}
  .team-name{font-weight:700;font-size:13px;}
  .stat{text-align:center;font-size:13px;}
  .pts-badge{text-align:center;border-radius:8px;padding:4px 0;font-size:15px;font-weight:900;}
  /* results */
  .section-label{font-size:11px;color:#e2b96b;letter-spacing:1px;margin-bottom:14px;text-transform:uppercase;}
  .match-list{display:flex;flex-direction:column;gap:7px;}
  .match-card{background:#12122a;border-radius:12px;padding:11px 16px;display:flex;align-items:center;gap:10px;border:1px solid #ffffff06;}
  .match-rnd{font-size:10px;color:#333;width:22px;text-align:center;flex-shrink:0;}
  .match-team{flex:1;font-weight:700;font-size:13px;}
  .match-team.home{text-align:right;}.match-team.away{text-align:left;}
  .score-box{background:#1a1a3e;border-radius:8px;padding:5px 14px;font-weight:900;font-size:15px;letter-spacing:2px;border:1px solid #2a2a4a;min-width:68px;text-align:center;flex-shrink:0;}
  /* fixtures */
  .round-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
  .round-btn{padding:7px 14px;border-radius:8px;border:1px solid #2a2a4a;background:#12122a;color:#777;font-weight:700;font-size:12px;cursor:pointer;letter-spacing:1px;font-family:'Trebuchet MS',sans-serif;}
  .round-btn.active{border-color:#e2b96b;background:#e2b96b22;color:#e2b96b;}
  .round-btn.done{color:#444;}.round-btn.partial{color:#ffd54f;}
  .fixture-row{background:#12122a;border-radius:14px;padding:16px 18px;border:1px solid #e2b96b22;display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .fixture-row.played{border-color:#ffffff08;}
  .fixture-team{flex:1;font-weight:800;font-size:14px;}
  .fixture-team.home{text-align:right;}.fixture-team.away{text-align:left;}
  .team-underline{height:2px;border-radius:1px;margin-top:4px;}
  .score-inputs{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .score-input{width:50px;height:50px;border-radius:10px;font-size:20px;font-weight:900;text-align:center;outline:none;cursor:pointer;transition:all .15s;}
  .vs-dash{color:#333;font-weight:900;font-size:20px;}
  .hint{margin-top:10px;font-size:11px;color:#333;text-align:center;}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="title-row">
      <div class="logo">
        <span style="font-size:30px">⚽</span>
        <div>
          <div class="logo-text">League Tracker</div>
          <div class="logo-sub">LIVE STANDINGS · AUTO-SAVED</div>
        </div>
      </div>
      <div class="btn-row">
        <span class="saved-msg" id="savedMsg" style="display:none">✓ Saved</span>
        <div style="position:relative">
          <button class="btn btn-export" onclick="toggleExportMenu()">📸 EXPORT</button>
          <div class="export-menu" id="exportMenu">
            <div class="export-menu-title">Downloads image to device</div>
            <button class="export-item" onclick="doExport('standings')">🏆  Standings image</button>
            <button class="export-item" onclick="doExport('results')">✅  Results image</button>
            <button class="export-item" onclick="doExport('fixtures')">📅  Fixtures image</button>
            <button class="export-item all" onclick="doExport('all')">📦  All 3 images</button>
          </div>
        </div>
        <button class="btn btn-reset" onclick="resetAll()">RESET</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('standings',this)">🏆 Standings</button>
      <button class="tab" onclick="switchTab('results',this)">✅ Results</button>
      <button class="tab" onclick="switchTab('fixtures',this)">📅 Fixtures</button>
    </div>
  </div>
</div>

<div class="content">
  <div class="panel active" id="panel-standings">
    <div class="standings-table">
      <div class="st-header">
        <div style="text-align:center">#</div>
        <div>Team</div>
        <div style="text-align:center">P</div>
        <div style="text-align:center">W</div>
        <div style="text-align:center">D</div>
        <div style="text-align:center">L</div>
        <div style="text-align:center">GF</div>
        <div style="text-align:center">GA</div>
        <div style="text-align:center">GD</div>
        <div style="text-align:center">PTS</div>
      </div>
      <div id="standings-body"></div>
    </div>
    <div class="hint">Sorted by Points → Goal Difference → Goals Scored · Auto-saved to this browser</div>
  </div>

  <div class="panel" id="panel-results">
    <div class="section-label" id="results-label"></div>
    <div class="match-list" id="results-list"></div>
  </div>

  <div class="panel" id="panel-fixtures">
    <div class="round-btns" id="round-btns"></div>
    <div id="fixtures-list"></div>
  </div>
</div>
 
<script type="module">
// 1. IMPORT FIREBASE LIBRARIES
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";

// 2. PASTE YOUR CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyBI8uhhkdTFMcx8RS4gCsSxS3Fa7DzPzV4",
  authDomain: "league-e398e.firebaseapp.com",
  projectId: "league-e398e",
  storageBucket: "league-e398e.firebasestorage.app",
  messagingSenderId: "919265771771",
  appId: "1:919265771771:web:cabc8b9737c823f03eb05e",
  measurementId: "G-CWLL7P4EVT"
};

// 3. INITIALIZE FIREBASE
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const leagueRef = ref(db, 'league_data');

// --- YOUR ORIGINAL TEAM DATA ---
const TEAMS = ["AC ZEWITA","CASANEGRA","EAGLES","T600","TELABA FC","THE OG'S"];
const TEAM_COLORS = {"AC ZEWITA":"#00b4d8","CASANEGRA":"#e63946","EAGLES":"#f4d03f","T600":"#a8dadc","TELABA FC":"#06d6a0","THE OG'S":"#ff9f1c"};
const INITIAL_FIXTURES = [
  {round:1,home:"AC ZEWITA",away:"EAGLES",hg:1,ag:1},
  {round:1,home:"TELABA FC",away:"CASANEGRA",hg:2,ag:1},
  {round:1,home:"THE OG'S",away:"T600",hg:1,ag:0},
  {round:2,home:"AC ZEWITA",away:"CASANEGRA",hg:1,ag:1},
  {round:2,home:"EAGLES",away:"T600",hg:0,ag:8},
  {round:2,home:"TELABA FC",away:"THE OG'S",hg:4,ag:2},
  {round:3,home:"AC ZEWITA",away:"T600",hg:3,ag:0},
  {round:3,home:"CASANEGRA",away:"THE OG'S",hg:2,ag:1},
  {round:3,home:"EAGLES",away:"TELABA FC",hg:6,ag:2},
  {round:4,home:"AC ZEWITA",away:"THE OG'S",hg:3,ag:4},
  {round:4,home:"T600",away:"TELABA FC",hg:1,ag:4},
  {round:4,home:"CASANEGRA",away:"EAGLES",hg:4,ag:2},
  {round:5,home:"AC ZEWITA",away:"TELABA FC",hg:null,ag:null},
  {round:5,home:"THE OG'S",away:"EAGLES",hg:null,ag:null},
  {round:5,home:"T600",away:"CASANEGRA",hg:null,ag:null},
  {round:6,home:"EAGLES",away:"AC ZEWITA",hg:null,ag:null},
  {round:6,home:"CASANEGRA",away:"TELABA FC",hg:null,ag:null},
  {round:6,home:"T600",away:"THE OG'S",hg:null,ag:null},
  {round:7,home:"CASANEGRA",away:"AC ZEWITA",hg:null,ag:null},
  {round:7,home:"T600",away:"EAGLES",hg:null,ag:null},
  {round:7,home:"THE OG'S",away:"TELABA FC",hg:null,ag:null},
  {round:8,home:"T600",away:"AC ZEWITA",hg:null,ag:null},
  {round:8,home:"THE OG'S",away:"CASANEGRA",hg:null,ag:null},
  {round:8,home:"TELABA FC",away:"EAGLES",hg:null,ag:null},
  {round:9,home:"THE OG'S",away:"AC ZEWITA",hg:null,ag:null},
  {round:9,home:"TELABA FC",away:"T600",hg:null,ag:null},
  {round:9,home:"EAGLES",away:"CASANEGRA",hg:null,ag:null},
  {round:10,home:"TELABA FC",away:"AC ZEWITA",hg:null,ag:null},
  {round:10,home:"EAGLES",away:"THE OG'S",hg:null,ag:null},
  {round:10,home:"CASANEGRA",away:"T600",hg:null,ag:null}
];

let fixtures = [];
let activeRound = 5;

// 4. NEW CLOUD STORAGE FUNCTIONS
function saveData() {
  set(leagueRef, fixtures); // This pushes the data to everyone's PC
  const el = document.getElementById('savedMsg');
  el.style.display = 'inline';
  setTimeout(() => el.style.display = 'none', 1500);
}

function loadData() {
  // onValue is "Magic" - it triggers every time ANYONE changes a score
  onValue(leagueRef, (snapshot) => {
    const data = snapshot.val();
    if (data) {
      fixtures = data;
    } else {
      fixtures = JSON.parse(JSON.stringify(INITIAL_FIXTURES));
    }
    renderAll();
  });
}

// --- KEEP ALL YOUR RENDER LOGIC BELOW ---
// (Copy-pasting the logic from your file so it still works)

function computeStandings(){
  const s={};
  TEAMS.forEach(t=>{s[t]={p:0,w:0,d:0,l:0,gf:0,ga:0};});
  fixtures.forEach(({home,away,hg,ag})=>{
    if(hg===null||ag===null)return;
    const h=s[home],a=s[away];
    h.p++;a.p++;h.gf+=hg;h.ga+=ag;a.gf+=ag;a.ga+=hg;
    if(hg>ag){h.w++;a.l++;}else if(hg<ag){a.w++;h.l++;}else{h.d++;a.d++;}
  });
  return Object.entries(s).map(([name,st])=>({name,...st,gd:st.gf-st.ga,pts:st.w*3+st.d}))
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.name.localeCompare(b.name));
}

function renderStandings(){
  const st=computeStandings();
  const medals=["#c9a84c","#9e9e9e","#a0522d"];
  let html='';
  st.forEach((t,i)=>{
    const pos=i+1,color=TEAM_COLORS[t.name]||'#fff';
    const posBg=pos<=3?medals[pos-1]:'transparent';
    const posColor=pos===1||pos===3?'#fff':pos===2?'#000':'#666';
    const posBorder=pos>3?'border:1px solid #2a2a4a;':'';
    const gd=t.gd>0?'+'+t.gd:t.gd;
    const gdColor=t.gd>0?'#69f0ae':t.gd<0?'#ff6b6b':'#888';
    html+=`<div class="st-row">
      <div><div class="pos-badge" style="background:${posBg};color:${posColor};${posBorder}">${pos}</div></div>
      <div class="team-cell">
        <div class="team-strip" style="background:${color}"></div>
        <span class="team-name">${t.name}</span>
      </div>
      <div class="stat" style="color:#888">${t.p}</div>
      <div class="stat" style="color:#69f0ae;font-weight:700">${t.w}</div>
      <div class="stat" style="color:#ffd54f">${t.d}</div>
      <div class="stat" style="color:#ff6b6b">${t.l}</div>
      <div class="stat" style="color:rgba(255,255,255,.7)">${t.gf}</div>
      <div class="stat" style="color:rgba(255,255,255,.5)">${t.ga}</div>
      <div class="stat" style="color:${gdColor};font-weight:700">${gd}</div>
      <div class="pts-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${t.pts}</div>
    </div>`;
  });
  document.getElementById('standings-body').innerHTML=html;
}

function renderResults(){
  const played=fixtures.filter(f=>f.hg!==null);
  document.getElementById('results-label').textContent=played.length+' matches played';
  let html='';
  played.forEach(f=>{
    const draw=f.hg===f.ag,hWin=f.hg>f.ag;
    const scoreColor=draw?'#ffd54f':'#fff';
    const hColor=hWin?'#69f0ae':draw?'#ffd54f':'#777';
    const aColor=!hWin&&!draw?'#69f0ae':draw?'#ffd54f':'#777';
    html+=`<div class="match-card">
      <div class="match-rnd">R${f.round}</div>
      <div class="match-team home" style="color:${hColor}">${f.home}</div>
      <div class="score-box" style="color:${scoreColor}">${f.hg} – ${f.ag}</div>
      <div class="match-team away" style="color:${aColor}">${f.away}</div>
    </div>`;
  });
  document.getElementById('results-list').innerHTML=html;
}

function renderFixtures(){
  const rounds=[...new Set(fixtures.map(f=>f.round))];
  let btnHtml='';
  rounds.forEach(r=>{
    const rf=fixtures.filter(f=>f.round===r);
    const done=rf.every(f=>f.hg!==null),partial=rf.some(f=>f.hg!==null)&&!done;
    const cls='round-btn'+(r===activeRound?' active':done?' done':partial?' partial':'');
    const lbl=done?' ✓':partial?' …':'';
    btnHtml+=`<button class="${cls}" onclick="window.setRound(${r})">R${r}${lbl}</button>`;
  });
  document.getElementById('round-btns').innerHTML=btnHtml;

  let html='';
  fixtures.forEach((f,idx)=>{
    if(f.round!==activeRound)return;
    const played=f.hg!==null&&f.ag!==null;
    const hc=TEAM_COLORS[f.home]||'#fff',ac=TEAM_COLORS[f.away]||'#fff';
    const hWin=played&&f.hg>f.ag,aWin=played&&f.ag>f.hg,draw=played&&f.hg===f.ag;
    const hColor=hWin?'#69f0ae':aWin?'#ff6b6b77':'#fff';
    const aColor=aWin?'#69f0ae':hWin?'#ff6b6b77':'#fff';
    const hVal=f.hg===null?'':f.hg,aVal=f.ag===null?'':f.ag;
    const hBg=hWin?hc+'33':draw?'#2a2a1a':'#1a1a3e';
    const aBg=aWin?ac+'33':draw?'#2a2a1a':'#1a1a3e';
    const hBorder=hWin?hc:draw?'#ffd54f66':hVal!==''?hc+'55':'#2a2a4a';
    const aBorder=aWin?ac:draw?'#ffd54f66':aVal!==''?ac+'55':'#2a2a4a';
    const hTxtColor=hWin?hc:draw?'#ffd54f':hVal!==''?'#fff':'#444';
    const aTxtColor=aWin?ac:draw?'#ffd54f':aVal!==''?'#fff':'#444';
    html+=`<div class="fixture-row${played?' played':''}">
      <div class="fixture-team home" style="color:${hColor}">
        ${f.home}
        <div class="team-underline" style="background:${hc}55"></div>
      </div>
      <div class="score-inputs">
        <input class="score-input" type="number" min="0" value="${hVal}" placeholder="–"
          style="background:${hBg};border:2px solid ${hBorder};color:${hTxtColor}"
          oninput="window.updateScore(${idx},'hg',this.value)"/>
        <span class="vs-dash">–</span>
        <input class="score-input" type="number" min="0" value="${aVal}" placeholder="–"
          style="background:${aBg};border:2px solid ${aBorder};color:${aTxtColor}"
          oninput="window.updateScore(${idx},'ag',this.value)"/>
      </div>
      <div class="fixture-team away" style="color:${aColor}">
        ${f.away}
        <div class="team-underline" style="background:${ac}55"></div>
      </div>
    </div>`;
  });
  document.getElementById('fixtures-list').innerHTML=html;
}

function renderAll(){renderStandings();renderResults();renderFixtures();}

// 5. ATTACH TO WINDOW (Required because this is a "module" script)
window.updateScore = (idx, field, val) => { ... };
  const p = val === '' ? null : parseInt(val);
  fixtures[idx][field] = isNaN(p) ? null : p;
  saveData();
};
window.setRound = (r) => { ... };
window.switchTab = (name, btn) => { ... };
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
};
window.resetAll = () => { ... };
  if (!confirm('Reset all results?')) return;
  fixtures = JSON.parse(JSON.stringify(INITIAL_FIXTURES));
  saveData();
};
window.toggleExportMenu = () => { document.getElementById('exportMenu').classList.toggle('open'); };

// Initialize
loadData();
</script>
</script>
</body>
</html>
